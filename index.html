<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS AI HR Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Livvic', sans-serif;
            background: #f0f4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 700px;
            height: 85vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #5B21B6;
            color: white;
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
        }
        .chat-header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message { max-width: 80%; }
        .message.user {
            align-self: flex-end;
            background: #5B21B6;
            color: white;
            padding: 12px 16px;
            border-radius: 16px 16px 4px 16px;
        }
        .message.bot {
            align-self: flex-start;
            background: #f3f0ff;
            color: #1e1e2e;
            padding: 12px 16px;
            border-radius: 16px 16px 16px 4px;
        }
        .sources {
            font-size: 11px;
            color: #7c3aed;
            margin-top: 8px;
            font-weight: 600;
        }
        .typing {
            align-self: flex-start;
            background: #f3f0ff;
            padding: 12px 16px;
            border-radius: 16px;
            color: #7c3aed;
            font-style: italic;
        }
        .chat-input {
            display: flex;
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            gap: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: 'Livvic', sans-serif;
        }
        .chat-input input:focus {
            border-color: #5B21B6;
        }
        .chat-input button {
            background: #5B21B6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Livvic', sans-serif;
        }
        .chat-input button:hover {
            background: #4c1d95;
        }
        .chat-input button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            SWS AI HR Assistant
            <p>Ask me anything about company policies</p>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot">
                Hi! I am the SWS AI HR Assistant. Ask me anything about company policies — leave, HR, IT security, resignation, and more!
            </div>
        </div>
        <div class="chat-input">
            <input
                type="text"
                id="userInput"
                placeholder="Ask about leave policy, resignation, IT security..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const messages = document.getElementById('messages');
            const sendBtn = document.getElementById('sendBtn');
            const question = input.value.trim();
            if (!question) return;

            messages.innerHTML += `
                <div class="message user">${question}</div>
            `;
            input.value = '';
            sendBtn.disabled = true;

            messages.innerHTML += `
                <div class="typing" id="typing">Thinking...</div>
            `;
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('http://127.0.0.1:8000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                document.getElementById('typing').remove();

                messages.innerHTML += `
                    <div class="message bot">
                        ${data.answer}
                        <div class="sources">Sources: ${data.sources.join(', ')}</div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('typing').remove();
                messages.innerHTML += `
                    <div class="message bot">
                        Error connecting to backend. Make sure the API is running.
                    </div>
                `;
            }
            sendBtn.disabled = false;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
